<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卒団おめでとう | 思い出リンク</title>
  <meta
    name="description"
    content="卒団おめでとうの気持ちを込めた、思い出写真とムービーのリンクページ。"
  >
  <meta name="theme-color" content="#2f9a78">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="ambient ambient-a" aria-hidden="true"></div>
  <div class="ambient ambient-b" aria-hidden="true"></div>
  <div class="ambient ambient-c" aria-hidden="true"></div>

  <main class="page">
    <section class="profile-layout" aria-labelledby="page-title">
      <aside class="visual-column">
        <p class="badge duotone-text" id="page-badge">Mini Basket Graduation</p>

        <section class="memory-gallery-panel" aria-labelledby="gallery-heading">
          <div class="section-head">
            <div>
              <p class="section-kicker duotone-text">Memories</p>
              <h2 class="duotone-text" id="gallery-heading">Gallery</h2>
            </div>
            <p id="gallery-note" hidden></p>
          </div>

          <div class="gallery-shell">
            <div class="gallery-track" id="gallery-track" tabindex="0" aria-label="思い出写真ギャラリー"></div>
          </div>

          <div class="gallery-controls">
            <button class="gallery-nav gallery-prev" id="gallery-prev" type="button" aria-label="前の写真を見る">
              <span aria-hidden="true">‹</span>
            </button>
            <div class="gallery-dots" id="gallery-dots" aria-label="写真を選ぶ"></div>
            <button class="gallery-nav gallery-next" id="gallery-next" type="button" aria-label="次の写真を見る">
              <span aria-hidden="true">›</span>
            </button>
          </div>
        </section>
      </aside>

      <header class="intro-block">
        <p class="eyebrow duotone-text" id="page-eyebrow">Memories</p>
        <h1 id="page-title" class="duotone-text">卒団おめでとう</h1>
        <p class="roman-name" id="page-roman-name">Mini Basket Graduation</p>
        <p class="tagline" id="page-tagline">
          あの日の光景を、もう一度。
        </p>
        <p class="intro-note" id="intro-note" hidden></p>
      </header>

      <section class="video-panel" id="video-panel" aria-labelledby="video-heading">
        <div class="section-head">
          <div>
            <p class="section-kicker duotone-text">Memory Movie</p>
            <h2 class="duotone-text" id="video-heading">Movie</h2>
          </div>
          <p id="video-support-text" hidden></p>
        </div>

        <div class="video-card">
          <div class="video-frame" id="feature-media"></div>

          <div class="video-copy">
            <p class="video-note" id="video-note">
              みんなで見た、思い出のムービーです。
            </p>
            <div class="feature-actions" id="video-actions"></div>
          </div>
        </div>

        <section class="secondary-video-panel" id="day-movie" aria-labelledby="secondary-video-heading">
          <div class="secondary-video-head">
            <p class="section-kicker duotone-text" id="secondary-video-kicker">Graduation Day</p>
            <h3 class="duotone-text" id="secondary-video-heading">式の日の映像</h3>
          </div>
          <div class="secondary-video-frame" id="secondary-video-frame"></div>
        </section>
      </section>

      <section class="links-panel" aria-labelledby="links-heading">
        <div class="links-head">
          <div>
            <p class="section-kicker duotone-text">Music</p>
            <h2 class="duotone-text" id="links-heading">Music</h2>
          </div>
          <p id="links-note" hidden></p>
        </div>

        <nav id="link-list" class="link-list" aria-label="音楽リンク"></nav>
      </section>

      <footer class="footer-row">
        <p class="footer-copy" id="footer-copy" hidden></p>
        <p class="copyright">© <span id="year"></span> <span id="copyright-name">Mini Basket Graduation</span></p>
      </footer>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
